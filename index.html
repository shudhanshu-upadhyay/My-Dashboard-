<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorve Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f0e;
    --surface: #161714;
    --surface2: #1c1e1b;
    --border: #2a2c28;
    --accent: #1D9E75;
    --accent-dim: #0f5c43;
    --accent-glow: rgba(29,158,117,0.15);
    --text: #e8e8e2;
    --text-muted: #6b6d67;
    --text-dim: #3a3c38;
    --red: #e24b4a;
    --blue: #4a8fe2;
    --blue-dim: #1d3a5e;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-display);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 1.5rem 1rem 3rem;
  }

  /* subtle grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .dash { max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }

  /* Top bar */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.75rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: var(--accent);
    font-family: var(--font-mono);
    margin-bottom: 6px;
  }

  .greeting {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.1;
  }

  .date-str {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
    font-family: var(--font-mono);
  }

  .clock-wrap { text-align: right; }

  .clock {
    font-size: 28px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: -.02em;
    color: var(--text);
  }

  .sync-indicator {
    font-size: 10px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
    justify-content: flex-end;
  }

  .sync-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 10px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.5;
  }

  .stat-val {
    font-size: 28px;
    font-weight: 700;
    font-family: var(--font-mono);
    color: var(--accent);
    letter-spacing: -.02em;
  }

  .stat-lbl {
    font-size: 10px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-top: 4px;
    font-family: var(--font-mono);
  }

  /* Main grid */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem;
  }

  .card-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: var(--font-mono);
    margin-bottom: 1rem;
  }

  /* Tasks */
  .cat-toggle { display: flex; gap: 6px; margin-bottom: 10px; }

  .cat-btn {
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
  }

  .cat-btn.sel-work {
    background: var(--blue-dim);
    color: #7ab3f0;
    border-color: var(--blue);
  }

  .cat-btn.sel-life {
    background: var(--accent-glow);
    color: var(--accent);
    border-color: var(--accent);
  }

  .task-input-row { display: flex; gap: 6px; margin-bottom: 10px; }

  .task-input-row input {
    flex: 1;
    font-size: 13px;
    font-family: var(--font-display);
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    outline: none;
    transition: border-color .15s;
  }

  .task-input-row input:focus { border-color: var(--accent); }
  .task-input-row input::placeholder { color: var(--text-dim); }

  .task-input-row button {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }

  .task-input-row button:hover { background: var(--accent-dim); }

  .task-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .task-item:last-child { border-bottom: none; }

  .task-item input[type=checkbox] {
    width: 15px; height: 15px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .task-item .txt { flex: 1; }
  .task-item .done-txt { text-decoration: line-through; color: var(--text-muted); }

  .task-cat {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 600;
    font-family: var(--font-mono);
    flex-shrink: 0;
  }

  .task-cat.work { background: var(--blue-dim); color: #7ab3f0; }
  .task-cat.life { background: var(--accent-glow); color: var(--accent); }

  .del { font-size: 11px; color: var(--text-dim); cursor: pointer; padding: 0 4px; flex-shrink: 0; }
  .del:hover { color: var(--red); }
  .empty-msg { font-size: 13px; color: var(--text-muted); padding: 8px 0; font-family: var(--font-mono); }

  /* Timer */
  .timer-mode { display: flex; gap: 6px; justify-content: center; margin-bottom: 12px; }

  .mode-btn {
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s;
  }

  .mode-btn.active {
    background: var(--accent);
    border-color: var(--accent-dim);
    color: #fff;
  }

  .progress-ring { display: flex; justify-content: center; margin: 4px 0; }

  .timer-display {
    font-size: 48px;
    font-weight: 700;
    font-family: var(--font-mono);
    text-align: center;
    letter-spacing: -.03em;
    color: var(--text);
    margin: 6px 0;
  }

  .timer-btns { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }

  .timer-btns button {
    flex: 1;
    padding: 9px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-family: var(--font-display);
    cursor: pointer;
    transition: background .15s;
  }

  .timer-btns button:hover { background: var(--border); }

  .start-btn {
    background: var(--accent) !important;
    border-color: var(--accent-dim) !important;
    color: #fff !important;
    font-weight: 600 !important;
  }

  .start-btn:hover { background: var(--accent-dim) !important; }

  /* Quote */
  .quote-box {
    background: var(--surface2);
    border-radius: 10px;
    padding: .9rem 1rem;
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.7;
    font-style: italic;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: border-color .15s;
  }

  .quote-box:hover { border-color: var(--accent); }
  .quote-author { display: block; margin-top: 6px; font-size: 11px; font-style: normal; color: var(--text-dim); font-family: var(--font-mono); }

  /* Habits */
  .habit-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .habit-row:last-child { border-bottom: none; }

  .habit-info { width: 140px; flex-shrink: 0; }
  .habit-name { font-size: 14px; font-weight: 500; }
  .habit-streak { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: var(--font-mono); }

  .dots { display: flex; gap: 5px; }

  .dot {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: all .15s;
    flex-shrink: 0;
  }

  .dot:hover { border-color: var(--accent); }
  .dot.done { background: var(--accent); border-color: var(--accent-dim); }
  .dot.miss { background: var(--red); border-color: #8b2020; }

  .habit-header { display: flex; align-items: center; margin-bottom: 6px; }
  .day-labels { display: flex; gap: 5px; margin-left: 140px; }

  .day-lbl {
    width: 26px;
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-weight: 500;
  }

  .day-lbl.today { color: var(--accent); }
  .dot-hint { font-size: 11px; color: var(--text-dim); margin-top: 10px; font-family: var(--font-mono); }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    flex-direction: column;
    gap: 12px;
  }

  .loading-overlay.hidden { display: none; }

  .loader-brand {
    font-size: 20px;
    font-weight: 700;
    font-family: var(--font-display);
    color: var(--accent);
    letter-spacing: .1em;
  }

  .loader-bar {
    width: 200px;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .loader-bar-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    animation: load 1.2s ease forwards;
  }

  @keyframes load { to { width: 100%; } }

  .loader-text {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  @media(max-width:600px) {
    .grid2 { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stats-row .stat-card:last-child { grid-column: span 2; }
    .day-labels { margin-left: 110px; }
    .habit-info { width: 110px; }
    .greeting { font-size: 20px; }
    .clock { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loader">
  <div class="loader-brand">VORVE</div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
  <div class="loader-text">syncing your data…</div>
</div>

<div class="dash">

  <div class="top-bar">
    <div>
      <div class="brand">Vorve HQ</div>
      <div class="greeting" id="greeting">Good morning, Shudhanshu</div>
      <div class="date-str" id="date-str"></div>
    </div>
    <div class="clock-wrap">
      <div class="clock" id="clock"></div>
      <div class="sync-indicator">
        <div class="sync-dot"></div>
        <span>synced</span>
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="tasks-stat">0/0</div>
      <div class="stat-lbl">Tasks done</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="habit-stat">0%</div>
      <div class="stat-lbl">Habits today</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="focus-stat">0m</div>
      <div class="stat-lbl">Focus time</div>
    </div>
  </div>

  <div class="grid2">

    <!-- Tasks -->
    <div class="card" style="grid-row:span 2">
      <div class="card-title">Today's tasks</div>
      <div class="cat-toggle">
        <button class="cat-btn sel-work" id="cat-work" onclick="selCat('work')">Work</button>
        <button class="cat-btn" id="cat-life" onclick="selCat('life')">Personal</button>
      </div>
      <div class="task-input-row">
        <input type="text" id="task-input" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()">
        <button onclick="addTask()">+</button>
      </div>
      <div id="task-list"></div>
    </div>

    <!-- Timer -->
    <div class="card">
      <div class="card-title">Focus timer</div>
      <div class="timer-mode">
        <button class="mode-btn active" onclick="setMode(25,this)">Focus 25</button>
        <button class="mode-btn" onclick="setMode(5,this)">Break 5</button>
        <button class="mode-btn" onclick="setMode(15,this)">Break 15</button>
      </div>
      <div class="progress-ring">
        <svg width="100" height="100" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#2a2c28" stroke-width="6"/>
          <circle id="prog-ring" cx="50" cy="50" r="42" fill="none" stroke="#1D9E75" stroke-width="6"
            stroke-dasharray="264" stroke-dashoffset="264" stroke-linecap="round"
            transform="rotate(-90 50 50)" style="transition:stroke-dashoffset .5s"/>
        </svg>
      </div>
      <div class="timer-display" id="timer-disp">25:00</div>
      <div class="timer-btns">
        <button class="start-btn" id="start-btn" onclick="toggleTimer()">Start</button>
        <button onclick="resetTimer()">Reset</button>
      </div>
    </div>

    <!-- Quote -->
    <div class="card" onclick="nextQuote()" style="cursor:pointer">
      <div class="card-title">Daily fuel — click to refresh</div>
      <div class="quote-box" id="quote-box">…<span class="quote-author" id="quote-auth"></span></div>
    </div>

  </div>

  <!-- Habits -->
  <div class="card">
    <div class="card-title">Daily habits — this week</div>
    <div id="habit-list"></div>
  </div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────
const SUPABASE_URL = 'https://ydldtydriuousymxkfif.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkbGR0eWRyaW91c3lteGtmaWYiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTc0NDA0NTIyMCwiZXhwIjoyMDU5NjIxMjIwfQ.eyJpc3MiOiJzdXBhYmFzZSJ9';

async function sb(path, opts = {}) {
  const r = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...opts.headers
    },
    ...opts
  });
  if (!r.ok) return null;
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

// ── Clock ─────────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  const h = n.getHours(), m = n.getMinutes();
  document.getElementById('clock').textContent =
    (h % 12 || 12) + ':' + (m < 10 ? '0' : '') + m + ' ' + (h >= 12 ? 'PM' : 'AM');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('date-str').textContent =
    days[n.getDay()] + ', ' + months[n.getMonth()] + ' ' + n.getDate() + ' ' + n.getFullYear();
  const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = g + ', Shudhanshu';
}
updateClock();
setInterval(updateClock, 1000);

// ── Quotes ────────────────────────────────────────────────────
const quotes = [
  ["Discipline is choosing between what you want now and what you want most.", "Unknown"],
  ["Don't count the days, make the days count.", "Muhammad Ali"],
  ["You don't rise to the level of your goals, you fall to the level of your systems.", "James Clear"],
  ["Small daily improvements are the key to staggering long-term results.", "Unknown"],
  ["The secret of getting ahead is getting started.", "Mark Twain"],
  ["Do the hard work, especially when you don't feel like it.", "Seth Godin"],
  ["Every action you take is a vote for the person you want to become.", "James Clear"],
  ["It always seems impossible until it's done.", "Nelson Mandela"],
  ["Work while they sleep. Learn while they party. Save while they spend.", "Unknown"],
  ["Consistency is what transforms average into excellence.", "Unknown"],
];
let qi = Math.floor(Math.random() * quotes.length);
function nextQuote() {
  qi = (qi + 1) % quotes.length;
  const [q, a] = quotes[qi];
  document.getElementById('quote-box').innerHTML =
    q + '<span class="quote-author">— ' + a + '</span>';
}
nextQuote();

// ── Tasks ─────────────────────────────────────────────────────
let tasks = [];
let selCatVal = 'work';

function selCat(c) {
  selCatVal = c;
  document.getElementById('cat-work').className = 'cat-btn' + (c === 'work' ? ' sel-work' : '');
  document.getElementById('cat-life').className = 'cat-btn' + (c === 'life' ? ' sel-life' : '');
}

async function loadTasks() {
  const data = await sb('tasks?select=*');
  if (data) tasks = data;
  renderTasks();
  updateStats();
}

async function addTask() {
  const inp = document.getElementById('task-input');
  const t = inp.value.trim();
  if (!t) return;
  const task = { id: Date.now(), text: t, done: false, cat: selCatVal, date: new Date().toDateString() };
  inp.value = '';
  tasks.push(task);
  renderTasks();
  updateStats();
  await sb('tasks', {
    method: 'POST',
    prefer: 'return=minimal',
    body: JSON.stringify(task)
  });
}

async function toggleTask(id) {
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = !t.done;
  renderTasks();
  updateStats();
  await sb('tasks?id=eq.' + id, {
    method: 'PATCH',
    prefer: 'return=minimal',
    body: JSON.stringify({ done: t.done })
  });
}

async function deleteTask(id) {
  tasks = tasks.filter(x => x.id !== id);
  renderTasks();
  updateStats();
  await sb('tasks?id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' });
}

function renderTasks() {
  const today = new Date().toDateString();
  const todayTasks = tasks.filter(t => t.date === today);
  const el = document.getElementById('task-list');
  if (todayTasks.length === 0) {
    el.innerHTML = '<div class="empty-msg">// no tasks yet</div>';
    return;
  }
  el.innerHTML = todayTasks.map(t => `
    <div class="task-item">
      <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask(${t.id})">
      <span class="txt ${t.done ? 'done-txt' : ''}">${t.text}</span>
      <span class="task-cat ${t.cat}">${t.cat === 'work' ? 'Work' : 'Life'}</span>
      <span class="del" onclick="deleteTask(${t.id})">✕</span>
    </div>`).join('');
}

// ── Habits ────────────────────────────────────────────────────
const HABITS = [
  { name: 'Gym' },
  { name: 'Read 30min' },
  { name: 'Code / learn' },
  { name: 'Client outreach' },
];

let habitData = {};

async function loadHabits() {
  const data = await sb('habits?select=*');
  if (data) {
    habitData = {};
    data.forEach(row => { habitData[row.key] = row.status; });
  }
  renderHabits();
  updateStats();
}

async function toggleHabit(hIdx, dateStr) {
  const k = hIdx + '_' + dateStr;
  const cur = habitData[k];
  let next = cur === 'done' ? 'miss' : cur === 'miss' ? null : 'done';

  if (next === null) {
    delete habitData[k];
    await sb('habits?key=eq.' + encodeURIComponent(k), { method: 'DELETE', prefer: 'return=minimal' });
  } else {
    habitData[k] = next;
    await sb('habits', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates,return=minimal',
      headers: { 'Prefer': 'resolution=merge-duplicates,return=minimal' },
      body: JSON.stringify({ key: k, status: next })
    });
  }
  renderHabits();
  updateStats();
}

function getWeekDays() {
  const today = new Date();
  const day = today.getDay();
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today);
    d.setDate(today.getDate() - day + i);
    return d.toDateString();
  });
}

function getStreak(hIdx) {
  let streak = 0;
  const d = new Date();
  while (true) {
    const k = hIdx + '_' + d.toDateString();
    if (habitData[k] === 'done') { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function renderHabits() {
  const days = getWeekDays();
  const today = new Date().toDateString();
  const dayLabels = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
  const el = document.getElementById('habit-list');
  el.innerHTML = `
    <div class="habit-header">
      <div class="day-labels">
        ${days.map(d => `<div class="day-lbl ${d === today ? 'today' : ''}">${dayLabels[new Date(d).getDay()]}</div>`).join('')}
      </div>
    </div>
    ${HABITS.map((h, hIdx) => `
      <div class="habit-row">
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-streak">${getStreak(hIdx)}d streak</div>
        </div>
        <div class="dots">
          ${days.map(d => {
            const k = hIdx + '_' + d;
            const s = habitData[k];
            return `<div class="dot ${s || ''}" onclick="toggleHabit(${hIdx},'${d}')"></div>`;
          }).join('')}
        </div>
      </div>`).join('')}
    <div class="dot-hint">// once = done · twice = missed · thrice = clear</div>
  `;
}

// ── Focus Timer ───────────────────────────────────────────────
let timerSec = 25 * 60, timerTotal = 25 * 60;
let timerRunning = false, timerInt = null, focusToday = 0;

function setMode(min, btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  timerTotal = min * 60;
  timerSec = timerTotal;
  clearInterval(timerInt);
  timerRunning = false;
  document.getElementById('start-btn').textContent = 'Start';
  updateTimerUI();
}

function fmtTime(s) {
  return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60);
}

function updateTimerUI() {
  document.getElementById('timer-disp').textContent = fmtTime(timerSec);
  const pct = (timerTotal - timerSec) / timerTotal;
  document.getElementById('prog-ring').setAttribute('stroke-dashoffset', 264 - 264 * pct);
}

function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInt);
    timerRunning = false;
    document.getElementById('start-btn').textContent = 'Resume';
  } else {
    timerRunning = true;
    document.getElementById('start-btn').textContent = 'Pause';
    timerInt = setInterval(() => {
      if (timerSec > 0) {
        timerSec--;
        focusToday++;
        updateTimerUI();
        document.getElementById('focus-stat').textContent = Math.floor(focusToday / 60) + 'm';
      } else {
        clearInterval(timerInt);
        timerRunning = false;
        document.getElementById('start-btn').textContent = 'Start';
        alert('Session complete! Take a break.');
      }
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInt);
  timerRunning = false;
  timerSec = timerTotal;
  document.getElementById('start-btn').textContent = 'Start';
  updateTimerUI();
}

updateTimerUI();

// ── Stats ─────────────────────────────────────────────────────
function updateStats() {
  const today = new Date().toDateString();
  const todayTasks = tasks.filter(t => t.date === today);
  const done = todayTasks.filter(t => t.done).length;
  document.getElementById('tasks-stat').textContent = done + '/' + todayTasks.length;
  const habDone = HABITS.filter((_, i) => habitData[i + '_' + today] === 'done').length;
  document.getElementById('habit-stat').textContent = Math.round(habDone / HABITS.length * 100) + '%';
}

// ── Init ──────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadTasks(), loadHabits()]);
  document.getElementById('loader').classList.add('hidden');
}

init();
</script>
